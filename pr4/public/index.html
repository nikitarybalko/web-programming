<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Розробка API для енергетичних даних</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #f8f9fa;
      }
      .tester-container {
        max-width: 900px;
        margin: 50px auto;
      }
      #responseArea {
        background-color: #212529;
        color: #0dcaf0;
        padding: 15px;
        border-radius: 5px;
        min-height: 200px;
        white-space: pre-wrap;
        font-family: "Consolas", monospace;
      }
      .method-btn {
        width: 100%;
        margin-bottom: 10px;
      }
      .json-input {
        font-family: monospace;
      }
    </style>
  </head>
  <body>
    <div class="container tester-container">
      <header class="text-center mb-5">
        <h1 class="display-6 fw-bold text-primary">
          Розробка API для енергетичних даних
        </h1>
        <p class="text-muted">
          Інтерфейс для керування пристроями компенсації реактивної потужності
        </p>
      </header>

      <div class="row g-4">
        <div class="col-md-5">
          <div class="card shadow-sm mb-3">
            <div class="card-body">
              <h5 class="card-title mb-3">Параметри запиту</h5>

              <div class="mb-3">
                <label class="form-label"
                  >ID установки (для GET/PUT/PATCH/DELETE)</label
                >
                <input
                  type="number"
                  id="bankId"
                  class="form-control"
                  placeholder="Наприклад: 1"
                />
              </div>

              <div class="mb-3">
                <label class="form-label">JSON Body (для POST/PUT/PATCH)</label>
                <textarea
                  id="jsonBody"
                  class="form-control json-input"
                  rows="8"
                  placeholder='{
  "name": "Нова установка",
  "ratedPower": 200,
  "stepsCount": 8,
  "voltage": 0.4
}'
                ></textarea>
              </div>
            </div>
          </div>
        </div>

        <div class="col-md-7">
          <div class="card shadow-sm mb-4">
            <div class="card-body">
              <h5 class="card-title mb-3">Методи API</h5>
              <div class="row row-cols-2 g-2">
                <div class="col">
                  <button
                    onclick="makeRequest('GET_ALL')"
                    class="btn btn-outline-primary method-btn"
                  >
                    GET All
                  </button>
                </div>
                <div class="col">
                  <button
                    onclick="makeRequest('GET_ONE')"
                    class="btn btn-outline-info method-btn"
                  >
                    GET by ID
                  </button>
                </div>
                <div class="col">
                  <button
                    onclick="makeRequest('POST')"
                    class="btn btn-success method-btn"
                  >
                    POST Create
                  </button>
                </div>
                <div class="col">
                  <button
                    onclick="makeRequest('PUT')"
                    class="btn btn-warning method-btn"
                  >
                    PUT Update
                  </button>
                </div>
                <div class="col">
                  <button
                    onclick="makeRequest('PATCH')"
                    class="btn btn-secondary method-btn"
                  >
                    PATCH Partial
                  </button>
                </div>
                <div class="col">
                  <button
                    onclick="makeRequest('DELETE')"
                    class="btn btn-danger method-btn"
                  >
                    DELETE
                  </button>
                </div>
              </div>
            </div>
          </div>

          <div class="card shadow-sm">
            <div
              class="card-header d-flex justify-content-between align-items-center"
            >
              <span>Response</span>
              <span id="statusBadge" class="badge bg-secondary">Status: -</span>
            </div>
            <div class="card-body">
              <div id="responseArea">Тут буде результат запиту...</div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
